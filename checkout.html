<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout – Apex Mining Consultants</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar (copy from other pages) -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">◆</span>
                <span class="logo-text">Apex Mining</span>
            </a>
            <button class="mobile-toggle" aria-label="Toggle menu">☰</button>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="course.html">Course</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="payments.html">Payments</a></li>
                <li><a href="#support">Support</a></li>
            </ul>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1>Order Review & Checkout</h1>
            <p>Please review your selection before proceeding to payment.</p>
        </div>
    </header>

    <section class="section checkout-section">
        <div class="container">
            <div class="order-summary">
                <h2>Your Order</h2>
                <div id="order-details">
                    <p><strong>Item:</strong> <span id="item-name">Loading...</span></p>
                    <p><strong>Details:</strong> <span id="item-specs"></span></p>
                    <p><strong>Price:</strong> <span id="item-price" class="price"></span></p>
                </div>
                <div class="total">
                    <p><strong>Total:</strong> <span id="total-price"></span></p>
                </div>
                <button id="proceed-btn" class="btn btn-primary">Proceed to Payment</button>
            </div>
        </div>
    </section>

    <!-- Support & footer (copy from other pages) -->

    <script src="script.js"></script>
    <script>
      // Checkout logic (read from URL params)
      document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const item = urlParams.get('item') || 'Unknown Item';
        const specs = urlParams.get('specs') || '';
        const price = urlParams.get('price') || '$0';

        document.getElementById('item-name').textContent = item;
        document.getElementById('item-specs').textContent = specs;
        document.getElementById('item-price').textContent = price;
        document.getElementById('total-price').textContent = price;

        // Proceed button redirects to payments.html
        document.getElementById('proceed-btn').addEventListener('click', () => {
          window.location.href = 'payments.html';
        });
      });
    </script>
</body>
</html>
